<!DOCTYPE HTML>
<html>
	<head>
		<title>Portfolio-Kacper</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<div id="banner-bg" class="banner-bg" aria-hidden="true">
			<div class="banner-grid"></div>
		</div>

		<div id="wrapper">

			<nav id="nav">
				<a href="#home" id="nav-home" class="icon solid fa-home"><span>Home</span></a>
				<a href="#contact" id="nav-contact" class="icon solid fa-envelope"><span>Contact</span></a>
				<a href="https://www.instagram.com/munajt.posters/" target="_blank" rel="noopener noreferrer" class="icon brands fa-instagram"><span>Instagram</span></a>
			</nav>

			<div id="main" class="single-page">

				<section id="home" class="page-block page-home">
					<header>
						<h1>Kacper P.</h1>
						<p class="tagline">Graphic Designer</p>
					</header>
					<p class="intro-text">
						Graphic designer focused on posters, branding and visual concepts. Select a category below.
					</p>
					<div class="work-categories" id="work-categories-nav"></div>
				</section>

			</div>

				<section id="work-gallery" class="page-block page-gallery is-hidden" hidden>
					<div id="work-sections"></div>
				</section>

				<section id="contact" class="page-block page-contact is-hidden" hidden>
					<form action="https://formspree.io/f/mgondqkz" method="POST">
						<div>
							<div class="row">
								<div class="col-6 col-12-medium">
									<input type="text" name="name" placeholder="Name" />
								</div>
								<div class="col-6 col-12-medium">
									<input type="text" name="email" placeholder="Email" />
								</div>
								<div class="col-12">
									<input type="text" name="subject" placeholder="Subject" />
								</div>
								<div class="col-12">
									<textarea name="message" placeholder="Message" rows="6"></textarea>
								</div>
								<div class="col-12">
									<input type="submit" value="Send!" />
								</div>
							</div>
						</div>
					</form>
				</section>

			<div id="footer">
				<ul class="copyright">
					<li>Design: <a href="https://www.instagram.com/munajt.posters/">Kacper P.</a></li>
				</ul>
			</div>

		</div>

		<button type="button" id="scroll-top" class="scroll-top icon solid fa-arrow-up" aria-label="Back to top" title="Back to top" hidden></button>

		<div id="image-overlay" class="image-overlay">
			<button type="button" class="image-overlay-close" aria-label="Close">&times;</button>
			<div class="image-overlay-content">
				<div class="image-overlay-media">
					<img src="" alt="" />
				</div>
				<div class="image-overlay-text">
					<p class="placeholder-text">place holder</p>
				</div>
			</div>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/work-config.js"></script>
		<script src="assets/js/banner-bg.js"></script>
		<script src="assets/js/main.js"></script>

	</body>
</html>
